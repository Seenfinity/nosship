<body class="bg-surface-950 text-gray-200">

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ================================================================ */
    /*  Constants & helpers                                              */
    /* ================================================================ */

    const STORAGE_KEY = 'nosship-designs';
    const ONBOARDING_KEY = 'nosship-onboarding-done';

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function pluginLabel(plugin) {
      if (typeof plugin === 'string') return plugin;
      if (!plugin) return '';
      if (typeof plugin === 'object') {
        return plugin.name || plugin.plugin || plugin.id || plugin.type || '';
      }
      return String(plugin);
    }

    function normalizePlugins(plugins) {
      if (!Array.isArray(plugins)) return [];
      return plugins.map(pluginLabel).filter(Boolean);
    }

    function loadDesigns() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        if (!Array.isArray(parsed)) return [];
        return parsed.map(d => ({
          ...d,
          plugins: normalizePlugins(d && d.plugins),
        }));
      } catch {
        return [];
      }
    }
    function saveDesigns(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

    /* Try to sync with server */
    let API_BASE = null;
    async function discoverApi() {
      try {
        const r = await fetch('/api/agents');
        const j = await r.json();
        const agent = j?.data?.agents?.find(a => [
          'Escalona Labs Agents Factory',
          'NosShip'
        ].includes(a.name));
        if (agent) {
          API_BASE = `/api/agents/${agent.id}/plugins/plugin-nosana-deploy`;
          return agent.id;
        }
      } catch {}
      return null;
    }

    async function syncToServer(design) {
      if (!API_BASE) return;
      try {
        await fetch(`${API_BASE}/designs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(design)
        });
      } catch {}
    }

    async function deleteFromServer(id) {
      if (!API_BASE) return;
      try { await fetch(`${API_BASE}/designs/${id}`, { method: 'DELETE' }); } catch {}
    }

    /* Parse markdown-ish text to simple HTML */
    function renderMd(text) {
      if (!text) return '';
      let s = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre class="bg-[#090714]/85 rounded-lg p-3 my-2 text-sm overflow-x-auto border border-white/12"><code>${code.trim()}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code class="bg-surface-950 px-1.5 py-0.5 rounded text-brand-400 text-sm">$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="text-gray-100 font-semibold">$1</strong>')
        .replace(/^\s*###\s+(.+)$/gm, '<h3 class="text-lg font-semibold text-white mt-4 mb-1">$1</h3>')
        .replace(/^\s*##\s+(.+)$/gm, '<h2 class="text-xl font-bold text-white mt-4 mb-2">$1</h2>')
        .replace(/^\s*[-*]\s+(.+)$/gm, '<li class="ml-4 list-disc">$1</li>')
        .replace(/^\s*\d+\.\s+(.+)$/gm, '<li class="ml-4 list-decimal">$1</li>')
        .replace(/^\s*>\s+(.+)$/gm, '<blockquote class="border-l-2 border-brand-500/50 pl-3 my-2 text-gray-400 italic">$1</blockquote>')
        .replace(/\n{2,}/g, '<br/><br/>')
        .replace(/\n/g, '<br/>');
      return s;
    }

    /* Domain emoji icons */
    const DOMAIN_ICONS = {
      'crypto-monitoring': '\u{1F4CA}', 'crypto-trading': '\u{1F4C8}',
      'defi': '\u{1F4B0}', 'community': '\u{1F4AC}',
      'social-media': '\u{1F426}', 'dev-tools': '\u{1F6E0}',
      'research': '\u{1F50D}', 'customer-support': '\u{1F3A7}',
      'content-creation': '\u{270D}', 'general': '\u{1F916}',
    };

    /* Domain colors/labels */
    const DOMAIN_COLORS = {
      'crypto-monitoring': 'bg-yellow-950/50 text-yellow-400 border-yellow-800/60',
      'crypto-trading': 'bg-emerald-950/50 text-emerald-400 border-emerald-800/60',
      'defi': 'bg-violet-950/50 text-violet-400 border-violet-800/60',
      'community': 'bg-blue-950/50 text-blue-400 border-blue-800/60',
      'social-media': 'bg-pink-950/50 text-pink-400 border-pink-800/60',
      'dev-tools': 'bg-cyan-950/50 text-cyan-400 border-cyan-800/60',
      'research': 'bg-orange-950/50 text-orange-400 border-orange-800/60',
      'customer-support': 'bg-teal-950/50 text-teal-400 border-teal-800/60',
      'content-creation': 'bg-rose-950/50 text-rose-400 border-rose-800/60',
      'general': 'bg-gray-900/50 text-gray-400 border-gray-700/60',
    };

    const STATUS_BADGES = {
      'created': 'bg-gray-800/80 text-gray-400 border border-gray-700/50',
      'instructions-ready': 'bg-brand-500/15 text-brand-300 border border-brand-300/35',

    /* ================================================================ */
    /*  Icons (inline SVG)                                              */
    /* ================================================================ */

    const Icons = {
      plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>,
      grid: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>,
      chat: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>,
      code: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>,
      rocket: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 003.46-8.62 2.25 2.25 0 00-2.18-2.18 14.98 14.98 0 00-8.62 3.46m6.34 7.34L7.09 21.16A2.25 2.25 0 013 19.53V17.4a2.25 2.25 0 01.66-1.59l.44-.44m9.64-6.85a1.5 1.5 0 112.12 2.12"/></svg>,
      back: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>,
      send: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>,
      trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
      copy: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>,
    };

    /* ================================================================ */
    /*  Chat Hook                                                       */
    /* ================================================================ */

    /* ElizaOS SocketIO protocol constants */
    const SOCKET_MSG = { ROOM_JOINING: 1, SEND_MESSAGE: 2 };
    const SERVER_ID = '00000000-0000-0000-0000-000000000000';

    function useFactoryChat(agentId) {
      const [messages, setMessages] = useState([]);
      const [isTyping, setIsTyping] = useState(false);
      const socketRef = useRef(null);
      const entityIdRef = useRef(crypto.randomUUID());
      const channelIdRef = useRef(null);
      const joinedRef = useRef(false);

      useEffect(() => {
        if (!agentId) return;

        const socket = io(window.location.origin, {
          auth: { entityId: entityIdRef.current },
          transports: ['websocket', 'polling'],
        });
        socketRef.current = socket;

        socket.on('connect', () => {
          console.log('[EscalonaFactory] Socket connected:', socket.id);
          joinedRef.current = false;
        });

        /* Response from the agent */
        socket.on('messageBroadcast', (data) => {
          if (data?.senderId === entityIdRef.current) return;
          if (data?.entityId === entityIdRef.current) return;
          setIsTyping(false);
          setMessages(prev => [...prev, {
            id: uid(),
            role: 'assistant',
            text: data?.text || data?.message || data?.content?.text || '(no response)',
            ts: Date.now(),
          }]);
        });

        socket.on('connect_error', (err) => {
          console.warn('[EscalonaFactory] Socket error:', err.message);
        });

        return () => { socket.disconnect(); };
      }, [agentId]);

      const joinChannel = useCallback((channelId) => {
        if (!socketRef.current || joinedRef.current) return;
        /* Event "1" = ROOM_JOINING */
        socketRef.current.emit(String(SOCKET_MSG.ROOM_JOINING), {
          channelId: channelId,
          entityId: entityIdRef.current,
          agentId: agentId,
          messageServerId: SERVER_ID,
          metadata: { isDm: true, channelType: 'DM', targetUserId: agentId },
        });
        joinedRef.current = true;
      }, [agentId]);

      const sendMessage = useCallback((text) => {
        if (!socketRef.current || !text.trim()) return;

        /* Create channel on first message */
        if (!channelIdRef.current) {
          channelIdRef.current = crypto.randomUUID();
        }

        /* Join the channel if not done yet */
        joinChannel(channelIdRef.current);

        /* Add user message to UI immediately */
        setMessages(prev => [...prev, {
          id: uid(), role: 'user', text: text.trim(), ts: Date.now()
        }]);
        setIsTyping(true);

        /* Event "2" = SEND_MESSAGE — uses ElizaOS protocol fields */
        socketRef.current.emit(String(SOCKET_MSG.SEND_MESSAGE), {
          channelId: channelIdRef.current,
          senderId: entityIdRef.current,
          senderName: 'User',
          message: text.trim(),
          messageServerId: SERVER_ID,
          source: 'socketio',
          targetUserId: agentId,
          metadata: { isDm: true, channelType: 'DM', targetUserId: agentId },
        });
      }, [agentId, joinChannel]);

      return { messages, sendMessage, isTyping };
    }

    /* ================================================================ */
    /*  Agent Chat Hook — direct LLM via proxy                          */
    /* ================================================================ */

    function useAgentChat(design) {
      const [messages, setMessages] = useState([]);
      const [isTyping, setIsTyping] = useState(false);
      const historyRef = useRef([]);

      /* Build system prompt from the character JSON */
      const systemPrompt = React.useMemo(() => {
        if (!design?.characterJson) return 'You are a helpful assistant.';
        try {
          const c = JSON.parse(design.characterJson);
          const parts = [];
          if (c.system) parts.push(c.system);
          else {
            if (c.name) parts.push(`You are ${c.name}.`);
            if (Array.isArray(c.bio)) parts.push(c.bio.join(' '));
            else if (c.bio) parts.push(c.bio);
          }
          if (c.style?.all?.length) parts.push('Style guidelines: ' + c.style.all.join('. '));
          if (c.style?.chat?.length) parts.push('Chat style: ' + c.style.chat.join('. '));
          return parts.join('\n\n') || 'You are a helpful assistant.';
        } catch { return 'You are a helpful assistant.'; }
      }, [design?.characterJson]);

      const sendMessage = useCallback(async (text) => {
        if (!text.trim() || isTyping) return;

        setMessages(prev => [...prev, { id: uid(), role: 'user', text: text.trim(), ts: Date.now() }]);
        setIsTyping(true);

        historyRef.current.push({ role: 'user', content: text.trim() });
        const llmMessages = [
          { role: 'system', content: systemPrompt },
          ...historyRef.current.slice(-20),
        ];

        /* Create a placeholder assistant message that we'll stream into */
        const assistantId = uid();
        setMessages(prev => [...prev, { id: assistantId, role: 'assistant', text: '', ts: Date.now() }]);

        let fullText = '';

        try {
          const r = await fetch(`${API_BASE}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: llmMessages }),
          });

          if (!r.ok) {
            const errJson = await r.json().catch(() => ({ error: 'LLM error' }));
            fullText = errJson.error || '(Error)';
            setMessages(prev => prev.map(m => m.id === assistantId ? { ...m, text: fullText } : m));
            setIsTyping(false);
            return;
          }

          const reader = r.body?.getReader();
          if (!reader) {
            const j = await r.json();
            fullText = j.text || '(no response)';
            setMessages(prev => prev.map(m => m.id === assistantId ? { ...m, text: fullText } : m));
            historyRef.current.push({ role: 'assistant', content: fullText });
            setIsTyping(false);
            return;
          }

          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed.startsWith('data: ')) continue;
              const payload = trimmed.slice(6);
              if (payload === '[DONE]') continue;

              try {
                const chunk = JSON.parse(payload);
                if (chunk.error) { fullText += chunk.error; continue; }
                if (chunk.text) {
                  fullText += chunk.text;
                  /* Update the streaming message */
                  const snapshot = fullText;
                  setMessages(prev => prev.map(m => m.id === assistantId ? { ...m, text: snapshot } : m));
                }
              } catch {}
            }
          }

          historyRef.current.push({ role: 'assistant', content: fullText });
          if (!fullText) {
            setMessages(prev => prev.map(m => m.id === assistantId ? { ...m, text: '(no response)' } : m));
          }
        } catch (err) {
          setMessages(prev => prev.map(m => m.id === assistantId ? { ...m, text: fullText || '(Error connecting to LLM)' } : m));
        } finally {
          setIsTyping(false);
        }
      }, [systemPrompt, isTyping]);

      return { messages, sendMessage, isTyping };
    }

      // Detect when assistant produces a character file or instruction files
      useEffect(() => {
        const last = messages.filter(m => m.role === 'assistant').slice(-1)[0];
        if (!last || processedRef.current.has(last.id)) return;

        const text = last.text || '';
        // Character JSON parsing (agent creation)
        const jsonMatch = text.match(/```json\s*\n(\{[\s\S]*?"name"\s*:\s*"[^"]+[\s\S]*?\})\s*\n```/);
        if (!jsonMatch) return;

        try {
          const char = JSON.parse(jsonMatch[1]);
          if (!char.name || !char.plugins) return;

          processedRef.current.add(last.id);

          // Extract domain from the response
          const domainMatch = text.match(/\*\*Domain\*\*:\s*(\S+)/);
          const domain = domainMatch ? domainMatch[1] : 'general';

          const design = {
            id: uid(),
            name: char.name,
            username: char.username || char.name.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
            domain: domain,
            description: char.bio?.[0] || '',
            plugins: normalizePlugins(char.plugins || []),
            envVars: [],
            characterJson: jsonMatch[1],
            status: 'created',
            createdAt: Date.now(),
            updatedAt: Date.now(),
          };

          // Extract env vars from response
          const envMatch = text.match(/```env\s*\n([\s\S]*?)```/);
          if (envMatch) {
            design.envVars = envMatch[1].trim().split('\n')
              .map(l => l.split('=')[0].trim())
              .filter(Boolean);
          }

          onAgentCreated(design);

            )}
            {messages.map(msg => <ChatMessage key={msg.id} msg={msg} />)}
            {isTyping && <TypingIndicator name={agentName} />}
          </div>
          <ChatInput onSend={sendMessage} disabled={isTyping} placeholder={`Message ${agentName}...`} />
        </div>
      );
    }
    /* --- Agent Detail View --- */
    function DetailView({ design, onBack, onUpdate, agentId }) {
      const [tab, setTab] = useState('chat');
      const [editingChar, setEditingChar] = useState(false);
      const [charText, setCharText] = useState(design.characterJson);
      const [generatingInstructions, setGeneratingInstructions] = useState(false);

      const tabs = [
        { id: 'chat', label: 'Chat', icon: Icons.chat },
        { id: 'character', label: 'Character', icon: Icons.code },
        { id: 'instructions', label: 'Instruction Files', icon: Icons.rocket },
      ];

      const hasInstructionFiles = design.instructionFiles && design.instructionFiles.agentsMd;

      function handleGenerateInstructions() {
        if (generatingInstructions) return;
        setGeneratingInstructions(true);

        try {
          const username = design.username || design.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          const plugins = normalizePlugins(design.plugins || []);
          const envVars = (design.envVars || []).filter(Boolean);

          const pluginSection = plugins.length
            ? plugins.map((p) => `- \`${p}\``).join('\n')
            : '- \`@elizaos/plugin-bootstrap\`\n- \`@elizaos/plugin-openai\`';

          const envSection = envVars.length
            ? envVars.map((v) => `- \`${v}\``).join('\n')
            : '- None';

          const agentsMd = [
            '# AGENTS.md',
            '',
            '## Purpose and scope',
            `This repository defines **${design.name}** as an AI agent project generated by Escalona Labs Agents Factory.`,
            '',
            '## Commands (copy/paste, include flags)',
            '- Setup: `pnpm install`',
            `- Run: \`pnpm exec elizaos start --character ./characters/${username}.character.json\``,
            '- Test: `pnpm test`',
            '- Lint: `pnpm lint`',
            '- Format: `pnpm format`',
            '',
            '## Question methodology (mandatory)',
            '1. Ask one focused question at a time.',
            '2. Start with objective and expected outcome.',
            '3. Then ask channels/tools and data sources.',
            '4. Then ask boundaries (Always / Ask first / Never).',
            '5. Confirm summary before generating updates.',
            '',
            '## Plugins',
            pluginSection,
            '',
            '## Required Environment Variables',
            envSection,
            '',
            '## Boundaries (Always / Ask first / Never)',
            '- Always: explicit commands, short outputs, real paths.',
            '- Ask first: dependency changes, prompt policy changes.',
            '- Never: expose secrets, run destructive ops without approval.',
          ].join('\n');

          const claudeMd = [
            '# CLAUDE.md',
            '',
            'Follow `AGENTS.md` in repository root as the source of truth.',
            'If symlinks are supported: `ln -s AGENTS.md CLAUDE.md`',
          ].join('\n');

          const copilotInstructions = [
            '# .github/copilot-instructions.md',
            '',
            'Follow `AGENTS.md` at repository root.',
            'If something is unclear or risky, ask before proceeding.',
          ].join('\n');

          const questionnaireMd = [
            '# questions-methodology.md',
            '',
            `Agent: ${design.name}`,
            '',
            '1. What exact job should this agent do daily?',
            '2. Who is the user and what decision should the output enable?',
            '3. Which channels/tools are mandatory?',
            '4. What must be blocked by default?',
            '5. What output format is required?',
            '6. Confirm summary before generation.',
          ].join('\n');

          onUpdate({
            ...design,
            instructionFiles: {
              agentsMd,
              claudeMd,
              copilotInstructions,
              questionnaireMd,
            },
            status: 'instructions-ready',
            updatedAt: Date.now(),
          });
        } catch (err) {
          alert(err?.message || 'Failed to generate instruction files');
        } finally {
          setGeneratingInstructions(false);
        }
      }

      function handleSaveChar() {
        try {
          JSON.parse(charText);
          onUpdate({ ...design, characterJson: charText, updatedAt: Date.now() });
          setEditingChar(false);
        } catch { alert('Invalid JSON'); }
      }

      const domainClass = DOMAIN_COLORS[design.domain] || DOMAIN_COLORS.general;
      const domainIcon = DOMAIN_ICONS[design.domain] || '\u{1F916}';
      const statusClass = STATUS_BADGES[design.status] || STATUS_BADGES.created;

      const setupCommands = `ln -sf AGENTS.md CLAUDE.md\nmkdir -p .github\n# Save generated .github/copilot-instructions.md\n# Keep AGENTS.md as source of truth`;

      return (
        <div className="flex flex-col h-full">
          {/* Profile header */}
          <div className="border-b border-white/10 bg-[#110c22]/75 backdrop-blur-xl shrink-0">
            <div className="px-5 py-4">
              <div className="flex items-start gap-4">
                <button onClick={onBack} className="text-gray-300 hover:text-white transition-colors p-1 mt-0.5 -ml-1 rounded-lg hover:bg-white/10 shrink-0">
                  <Icons.back />
                </button>
                <div className="flex items-center gap-3 flex-1 min-w-0">
                  <div className="w-11 h-11 rounded-xl glass-soft flex items-center justify-center text-xl shrink-0">
                    {domainIcon}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <h1 className="text-lg font-bold text-white truncate">{design.name}</h1>
                      <span className={`text-[10px] px-2 py-0.5 rounded-full border ${domainClass}`}>{design.domain}</span>
                      <span className={`text-[10px] px-2 py-0.5 rounded-full ${statusClass}`}>{design.status.replace('-', ' ')}</span>
                    </div>
                    <p className="text-xs text-gray-500 mt-0.5 truncate">{design.description.substring(0, 140)}</p>
                  </div>
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="px-5">
              <div className="flex gap-1">
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`flex items-center gap-1.5 px-3 py-2.5 text-sm border-b-2 transition-colors
                      ${tab === t.id
                        ? 'border-brand-300 text-white'
                        : 'border-transparent text-gray-400 hover:text-gray-100'
                      }`}>
                    <t.icon /> {t.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {tab === 'chat' && (
            <div className="flex-1 overflow-hidden">
              <AgentChatTab design={design} />
            </div>
          )}

          <div className={`flex-1 overflow-y-auto p-5 scrollbar-thin ${tab === 'chat' ? 'hidden' : ''}`}>
            {tab === 'character' && (
              <div>
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-sm font-medium text-gray-400">characters/{design.username}.character.json</h2>
                  <div className="flex gap-2">
                    {editingChar ? (
                      <>
                        <button onClick={() => setEditingChar(false)} className="text-xs text-gray-500 hover:text-gray-300 px-2 py-1 rounded">Cancel</button>
                        <button onClick={handleSaveChar} className="text-xs bg-gradient-to-br from-brand-500 to-brand-700 hover:from-brand-400 hover:to-brand-600 text-white px-3 py-1.5 rounded-lg">Save</button>
                      </>
                    ) : (
                      <button onClick={() => setEditingChar(true)} className="text-xs text-brand-300 hover:text-brand-200 px-2 py-1 rounded">Edit</button>
                    )}
                  </div>
                </div>

                {editingChar ? (
                  <textarea value={charText} onChange={e => setCharText(e.target.value)}
                    className="w-full h-[500px] bg-[#0a0816]/80 border border-white/10 rounded-xl p-4 text-sm text-gray-200 font-mono resize-none focus:outline-none focus:ring-2 focus:ring-brand-400/40"
                    spellCheck="false" />
                ) : (
                  <CodeBlock title="character.json" code={(() => {
                    try { return JSON.stringify(JSON.parse(design.characterJson), null, 2); } catch { return design.characterJson; }
                  })()} />
                )}
              </div>
            )}

            {tab === 'instructions' && (
              <div>
                {!hasInstructionFiles ? (
                  <div className="flex flex-col items-center justify-center py-16 text-center">
                    <div className="w-14 h-14 rounded-2xl bg-brand-500/20 border border-brand-300/30 flex items-center justify-center mb-4 text-brand-300">
                      <Icons.rocket />
                    </div>
                    <h2 className="text-lg font-semibold text-white mb-2">No instruction files yet</h2>
                    <p className="text-sm text-gray-400 mb-4 max-w-sm">
                      Generate AGENTS.md-first files for {design.name} following the same question methodology.
                    </p>
                    <button
                      onClick={handleGenerateInstructions}
                      disabled={generatingInstructions}
                      className="bg-gradient-to-br from-brand-500 to-brand-700 hover:from-brand-400 hover:to-brand-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-xl px-5 py-2.5 transition-colors shadow-[0_8px_22px_rgba(110,48,232,.32)]">
                      {generatingInstructions ? 'Generating...' : 'Generate Instruction Files'}
                    </button>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {[
                      { title: 'AGENTS.md', icon: '\u{1F4CB}', desc: 'Source-of-truth instructions', code: design.instructionFiles.agentsMd },
                      { title: 'CLAUDE.md', icon: '\u{1F517}', desc: 'Claude compatibility instructions', code: design.instructionFiles.claudeMd },
                      { title: '.github/copilot-instructions.md', icon: '\u{1F916}', desc: 'Copilot coding agent instructions', code: design.instructionFiles.copilotInstructions },
                      { title: 'questions-methodology.md', icon: '\u{2753}', desc: 'One-question-at-a-time interview flow', code: design.instructionFiles.questionnaireMd },
                    ].map(file => (
                      <div key={file.title} className="glass-soft rounded-xl overflow-hidden">
                        <div className="flex items-center justify-between px-4 py-3 border-b border-white/10">
                          <div className="flex items-center gap-2.5">
                            <span className="text-base">{file.icon}</span>
                            <div>
                              <p className="text-sm font-medium text-white">{file.title}</p>
                              <p className="text-[10px] text-gray-500">{file.desc}</p>
                            </div>
                          </div>
                          <CopyBtn text={file.code} />
                        </div>
                        <pre className="p-4 text-xs text-gray-300 overflow-x-auto max-h-[280px] overflow-y-auto scrollbar-thin bg-[#0a0816]/75 font-mono">
                          <code>{file.code}</code>
                        </pre>
                      </div>
                    ))}

                    <div className="glass-panel rounded-xl p-5">
                      <h3 className="text-base font-semibold text-white mb-1 flex items-center gap-2">
                        <Icons.rocket /> Integration steps
                      </h3>
                      <p className="text-sm text-gray-400 mb-3">Copy and run these commands after saving files:</p>
                      <div className="bg-[#090714]/80 border border-white/10 rounded-lg p-4 relative">
                        <div className="absolute top-2 right-2"><CopyBtn text={setupCommands} /></div>
                        <pre className="text-sm text-brand-400 font-mono whitespace-pre-wrap">{setupCommands}</pre>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* --- Onboarding --- */
    function Onboarding({ onFinish }) {
      const [step, setStep] = useState(0);

      const steps = [
        {
          icon: () => <svg className="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>,
          title: 'Describe your agent',
          desc: 'Tell Escalona Labs Agents Factory what you need in plain language — a crypto tracker, a Discord bot, a DeFi assistant, anything.',
        },
        {
          icon: () => <svg className="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
          title: 'Factory builds it',
          desc: 'We generate a full character file, pick the right plugins, and produce AGENTS.md-first instruction files.',
        },
        {
          icon: () => <svg className="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 003.46-8.62 2.25 2.25 0 00-2.18-2.18 14.98 14.98 0 00-8.62 3.46m6.34 7.34L7.09 21.16A2.25 2.25 0 013 19.53V17.4a2.25 2.25 0 01.66-1.59l.44-.44m9.64-6.85a1.5 1.5 0 112.12 2.12"/></svg>,
          title: 'Chat & Export',
          desc: 'Test your agent in the built-in chat, then export its main instruction files.',
        },
      ];

      function handleNext() {
        if (step < steps.length - 1) setStep(step + 1);
        else onFinish();
      }

      return (
        <div className="fixed inset-0 z-50 bg-surface-950/95 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="glass-panel rounded-2xl max-w-md w-full p-8 animate-fade-in">
            {/* Step indicator */}
            <div className="flex items-center justify-center gap-2 mb-8">
              {steps.map((_, i) => (
                <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i === step ? 'w-8 bg-brand-500' : i < step ? 'w-4 bg-brand-500/40' : 'w-4 bg-gray-700'}`} />
              ))}
            </div>

            {/* Content */}
            <div className="text-center mb-8">
              <div className="w-16 h-16 rounded-2xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center mx-auto mb-5 glow">
                {React.createElement(steps[step].icon)}
              </div>
              <h2 className="text-xl font-bold text-white mb-2">{steps[step].title}</h2>
              <p className="text-sm text-gray-400 leading-relaxed">{steps[step].desc}</p>
            </div>

            {/* Actions */}
            <div className="flex items-center justify-between">
              <button onClick={onFinish} className="text-xs text-gray-500 hover:text-gray-300 transition-colors">
                Skip
              </button>
              <button onClick={handleNext}
                className="bg-gradient-to-br from-brand-500 to-brand-700 hover:from-brand-400 hover:to-brand-600 text-white font-semibold text-sm rounded-xl px-6 py-2.5 transition-colors shadow-[0_8px_22px_rgba(110,48,232,.32)]">
                {step < steps.length - 1 ? 'Next' : 'Get Started'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ================================================================ */
    /*  App                                                             */
    /* ================================================================ */

    function App() {
      const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem(ONBOARDING_KEY));
      const [view, setView] = useState('create');     // 'create' | 'agents' | 'detail'
      const [designs, setDesigns] = useState(loadDesigns());
      const [selectedId, setSelectedId] = useState(null);
      const [agentId, setAgentId] = useState(null);
      const [notification, setNotification] = useState(null);

      function finishOnboarding() {
        localStorage.setItem(ONBOARDING_KEY, '1');
        setShowOnboarding(false);
      }

      function startTour() {
        localStorage.removeItem(ONBOARDING_KEY);
        setShowOnboarding(true);
      }

      // Discover Escalona Labs Agents Factory agent ID on mount + sync designs from server
      useEffect(() => {
        discoverApi().then(async (id) => {
          setAgentId(id);
          if (!API_BASE) return;
          try {
            const r = await fetch(`${API_BASE}/designs`);
            const j = await r.json();
            if (j.success && j.data.length > 0) {
              setDesigns(prev => {
                const localIds = new Set(prev.map(d => d.id));
                const merged = [...prev];
                for (const sd of j.data) {
                  if (!localIds.has(sd.id)) merged.push(sd);
                }
                return merged;
              });
            }
          } catch {}
        });
      }, []);

      // Persist designs
      useEffect(() => { saveDesigns(designs); }, [designs]);

      function showNotification(text) {
        setNotification(text);
        setTimeout(() => setNotification(null), 3000);
      }

      function handleAgentCreated(design) {
        setDesigns(prev => {
          const exists = prev.find(d => d.id === design.id);
          if (exists) return prev;
          return [...prev, design];
        });
        syncToServer(design);
        showNotification(`${design.name} saved to My Agents`);
      }

      function handleDelete(id) {
        const d = designs.find(d => d.id === id);
        if (d && confirm(`Delete ${d.name}?`)) {
          setDesigns(prev => prev.filter(d => d.id !== id));
          deleteFromServer(id);
          if (selectedId === id) { setSelectedId(null); setView('agents'); }
        }
      }

      function handleUpdate(updated) {
        setDesigns(prev => prev.map(d => d.id === updated.id ? updated : d));
        syncToServer(updated);
      }

      function handleRename(id, newName) {
        setDesigns(prev => prev.map(d => {
          if (d.id !== id) return d;
          const updated = { ...d, name: newName, updatedAt: Date.now() };
          /* Also update name inside characterJson if it exists */
          try {
            const char = JSON.parse(d.characterJson);
            char.name = newName;
            char.username = newName.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            updated.characterJson = JSON.stringify(char);
            updated.username = char.username;
          } catch {}
          syncToServer(updated);
          return updated;
        }));
      }

      function handleSelect(id) {
        setSelectedId(id);
        setView('detail');
      }

      const selectedDesign = designs.find(d => d.id === selectedId);

      return (
        <div className="h-screen flex overflow-hidden relative bg-[radial-gradient(circle_at_top_right,rgba(110,48,232,.32),transparent_45%),radial-gradient(circle_at_bottom_left,rgba(59,130,246,.18),transparent_40%),linear-gradient(180deg,#0b0718,#06040f)] text-gray-100">
          <div className="pointer-events-none absolute -top-28 -right-20 w-[28rem] h-[28rem] rounded-full bg-brand-500/20 blur-3xl"></div>
          <div className="pointer-events-none absolute -bottom-32 left-32 w-[24rem] h-[24rem] rounded-full bg-blue-500/10 blur-3xl"></div>

          {/* Sidebar */}
          <Sidebar view={view === 'detail' ? 'agents' : view} setView={setView} agentCount={designs.length} designs={designs} onSelectAgent={handleSelect} onTour={startTour} />

          {/* Main content */}
          <div className="flex-1 flex flex-col min-w-0 relative">
            {view === 'create' && (
              <div className="animate-fade-in flex-1 flex flex-col min-h-0">
                <CreateView
                  agentId={agentId}
                  onAgentCreated={handleAgentCreated}
                  designs={designs}
                  onSelectAgent={handleSelect}
                />
              </div>
            )}
            {view === 'agents' && (
              <div className="animate-fade-in flex-1 flex flex-col min-h-0">
                <AgentsView designs={designs} onSelect={handleSelect} onDelete={handleDelete} onRename={handleRename} onGoCreate={() => setView('create')} />
              </div>
            )}
            {view === 'detail' && selectedDesign && (
              <div className="animate-fade-in flex-1 flex flex-col min-h-0">
              <DetailView
                design={selectedDesign}
                onBack={() => setView('agents')}
                onUpdate={handleUpdate}
                agentId={agentId}
              />
              </div>
            )}
          </div>

          {/* Notification toast */}
          {notification && (
            <div className="fixed bottom-6 right-6 bg-gradient-to-br from-brand-500 to-brand-700 text-white font-medium text-sm px-4 py-2.5 rounded-xl shadow-[0_12px_28px_rgba(110,48,232,.42)] animate-fade-in z-50 flex items-center gap-2">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>
              {notification}
            </div>
          )}

          {/* Onboarding overlay */}
          {showOnboarding && <Onboarding onFinish={finishOnboarding} />}
        </div>
      );
    }

    /* ================================================================ */
    /*  Mount                                                           */
    /* ================================================================ */

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
